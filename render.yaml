services:
  # 1. Django Main App
  - type: web
    name: aitube-main
    env: docker
    plan: free
    healthCheckPath: /login/
    startCommand: sh -c "cd django_app && python manage.py migrate --noinput && python manage.py collectstatic --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings

  # 2. YouTube Analysis Service
  - type: web
    name: aitube-youtube
    env: docker
    startCommand: uvicorn youtube_app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health

  # 3. Sentiment Service
  - type: web
    name: aitube-sentiment
    env: docker
    startCommand: uvicorn fastapi_services.sentiment.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health

  # 4. RAG Worker Service
  - type: web
    name: aitube-rag
    env: docker
    startCommand: uvicorn fastapi_services.rag_worker.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health

databases:
  - name: aitube-db
    databaseName: aitube
    user: aitube_user
