[supervisord]
nodaemon=true
user=root

[program:django]
command=gunicorn config.wsgi:application --bind 0.0.0.0:7860 --workers 2 --timeout 120
directory=/app/django_app
environment=PYTHONPATH="/app/django_app"
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:youtube_service]
command=uvicorn main:app --host 0.0.0.0 --port 8005
directory=/app/youtube_app
environment=PYTHONPATH="/app/youtube_app"
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:sentiment_service]
command=uvicorn sentiment.main:app --host 0.0.0.0 --port 8010
directory=/app/fastapi_services
environment=PYTHONPATH="/app/fastapi_services"
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:rag_worker]
command=uvicorn rag_worker.main:app --host 0.0.0.0 --port 8011
directory=/app/fastapi_services
environment=PYTHONPATH="/app/fastapi_services"
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
